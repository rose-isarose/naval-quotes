<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Naval" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #f0ece4; font-family: Georgia, "Times New Roman", serif; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
    #top { height: 33dvh; display: flex; align-items: center; justify-content: center; }
    #bottom { height: 67dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 2rem 4rem; }
    #avatar { width: 52px; height: 52px; object-fit: cover; }
    #quote { font-size: clamp(1.15rem, 4vw, 1.7rem); line-height: 1.65; text-align: center; max-width: 580px; opacity: 1; transition: opacity 0.25s ease; }
    #quote.fade { opacity: 0; }
    #attribution { margin-top: 1.75rem; font-size: 0.875rem; color: #666; letter-spacing: 0.04em; text-align: center; }
    #hint { position: fixed; bottom: 1.75rem; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #2a2a2a; letter-spacing: 0.12em; text-transform: uppercase; font-family: -apple-system, sans-serif; }
  </style>
  <title>Naval</title>
</head>
<body>
  <div id="top">
    <img id="avatar" src="naval-logo.png" alt="Naval Ravikant" />
  </div>
  <div id="bottom">
    <div id="quote"></div>
    <div id="attribution">— Naval Ravikant</div>
  </div>
  <div id="hint">tap for another</div>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
